<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap">
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="image-wrapper">
                <img src= "https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Nike Air Zoom Pulse X2" class="product-image">
                <span class="badge">-20% OFF</span>
            </div>

            <div class="card-info">
                <span class="tag">Running</span>

                <h3 class="product-name">Nike Air Zoom Pulse X2</h3>

                <div class="price-row">
                    <span class="old-price">$149.00</span>

                    <span class="new-price">$119.20</span>
                </div>

                <button class="cta-btn">Add to Cart</button>
            </div>
        </div>

    </div>
</body>
</html>
