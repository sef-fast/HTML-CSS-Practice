<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card 03 - Soft Minimal</title>

  <link rel="stylesheet" href="style.css">

 
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
 
  <div class="page">
    <div class="card">
    
      <div class="image-wrapper">
        <img
          src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=600&q=80"
          alt="Minimalist perfume bottle"
          class="product-image"
        >

        <div class="image-overlay"></div>

        <div class="ribbon">Limited</div>
      </div>

      
      <div class="card-body">

        <span class="tag">Fragrance</span>

        <h3 class="product-name">Maison Blanc <em>No. 7</em></h3>

       
        <p class="product-desc">A whisper of white tea, cedar, and soft musk.</p>

        <div class="size-selector">
          <span class="size-label">Size</span>
          <div class="size-options">

            <input type="radio" name="size" id="size-30" value="30ml">
            <label for="size-30" class="size-option">30ml</label>

            <input type="radio" name="size" id="size-50" value="50ml" checked>
            <label for="size-50" class="size-option">50ml</label>

            <input type="radio" name="size" id="size-100" value="100ml">
            <label for="size-100" class="size-option">100ml</label>

          </div>
        </div>

        <div class="price-row">
          <span class="old-price">$120.00</span>
          <span class="new-price">$89.00</span>
        </div>

        <button class="btn-primary">Add to Cart</button>

      </div>

    </div>
  </div>

</body>
</html>
