<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card 02 - Dark Luxury</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@400;500;600&display=swap">
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="image-wrapper">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&q=80" alt="Watch Image" class="product-image">
                <div class="overlay"></div>
                <span class="badge">New Arrival</span>
                <span class="badge-stock">Only 3 Left</span>
            </div>

            <div class="card-body">
                <span class="tag">Clock</span>

                <h3 class="product-name">Auruk Classic MK IV</h3>

                <div class="rating-row">
                    <span class="star filled">★</span>
                    <span class="star filled">★</span>
                    <span class="star filled">★</span>
                    <span class="star filled">★</span>
                    <span class="star empty">★</span>
                    <span class="rating-count">(128 reviews)</span>
                </div>

                <div class="price-row">
                    <span class="old-price">$380.00</span>
                    <span class="new-price">$295.00</span>
                </div>

                <div class="btn-row">
                    <button class="btn-primary">Add to Cart</button>
                    <button class="btn-secondary">♡ Save</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
